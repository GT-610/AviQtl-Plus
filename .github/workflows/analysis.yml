name: Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archlinux-keyring
          pacman -S --needed --noconfirm \
            base-devel git cmake ninja clang mold \
            qt6-base qt6-declarative qt6-quick3d qt6-multimedia qt6-shadertools \
            qt6-svg qt6-5compat qt6-tools qt6-wayland \
            ffmpeg luajit carla extra-cmake-modules \
            sudo ccache vulkan-headers vulkan-icd-loader

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build Tests
        run: cmake --build build

      - name: Diagnose Linux C++ startup
        shell: bash
        run: |
          set -euo pipefail
          test_bin=build/bin/AviQtl_Test_effect_registry

          echo '=== Toolchain and runtime packages ==='
          pacman -Q gcc libgcc libstdc++ glibc mold qt6-base
          c++ --version

          echo '=== Minimal iostream program ==='
          printf '%s\n' '#include <iostream>' 'int main() { std::cout << "ok" << std::endl; }' \
            | c++ -x c++ - -o /tmp/aviqtl-iostream-smoke
          set +e
          /tmp/aviqtl-iostream-smoke
          smoke_status=$?
          set -e
          echo "Minimal iostream exit status: $smoke_status"
          readelf -d /tmp/aviqtl-iostream-smoke

          echo '=== Test executable dynamic section ==='
          readelf -d "$test_bin"
          echo '=== Test executable library resolution ==='
          ldd "$test_bin"

          echo '=== Dynamic loader trace for test executable ==='
          set +e
          QT_QPA_PLATFORM=offscreen LD_DEBUG=libs,reloc "$test_bin" > /tmp/aviqtl-loader-debug.log 2>&1
          status=$?
          set -e
          echo "Test executable exit status: $status"
          tail -n 300 /tmp/aviqtl-loader-debug.log

          echo '=== Default-linker control executable ==='
          cmake -B build-default-linker -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_LINKER_TYPE=DEFAULT
          cmake --build build-default-linker --target AviQtl_Test_effect_registry
          ninja -C build-default-linker -t commands AviQtl_Test_effect_registry | tail -n 1
          set +e
          QT_QPA_PLATFORM=offscreen build-default-linker/bin/AviQtl_Test_effect_registry
          default_linker_status=$?
          set -e
          echo "Default-linker executable exit status: $default_linker_status"

      - name: Run Tests
        run: cd build && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run clang-tidy
        run: |
          # Remove GCC-specific flags not recognized by clang-tidy
          sed -i 's/-mno-direct-extern-access//g' build/compile_commands.json
          run-clang-tidy -p build -quiet \
            core/src/*.cpp \
            engine/**/*.cpp \
            scripting/*.cpp \
            ui/src/*.cpp \
            ui/src/**/*.cpp
        continue-on-error: false
