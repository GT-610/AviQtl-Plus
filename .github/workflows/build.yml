name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: AviQtl

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --needed --noconfirm \
            base-devel git cmake ninja clang mold \
            qt6-base qt6-declarative qt6-quick3d qt6-multimedia qt6-shadertools \
            qt6-svg qt6-5compat qt6-tools qt6-wayland \
            ffmpeg luajit carla extra-cmake-modules \
            sudo ccache vulkan-headers vulkan-icd-loader

      - name: Run Tests
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          cd build && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
            container: archlinux:latest
            artifact_name: AviQtl-Arch-Linux-x86_64
            artifact_path: dist/AviQtl-Arch-Linux-x86_64.zip
          - platform: macos
            runs_on: macos-14
            artifact_name: AviQtl-macOS-Universal
            artifact_path: dist/AviQtl-macOS-Xcode-Universal.zip
          - platform: windows
            runs_on: windows-latest
            artifact_name: AviQtl-Windows-x86_64
            artifact_path: dist/AviQtl-MSYS2-UCRT64-x86_64.zip
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --needed --noconfirm \
            base-devel git cmake ninja clang mold zip mesa vulkan-devel \
            libxkbcommon wayland wayland-protocols libffi ffmpeg luajit fftw \
            qt6-base qt6-wayland qt6-declarative qt6-quick3d qt6-multimedia qt6-shadertools \
            qt6-svg qt6-5compat qt6-tools lilv ladspa carla openmp \
            extra-cmake-modules libc++ fluidsynth spirv-tools \
            sudo ccache

      - name: Install Dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          echo "No additional dependencies needed"

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-python

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          max-size: 500M
          key: ${{ matrix.platform }}-ccache

      - name: Determine Version
        id: version
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            TAG_NAME="$REF_NAME"
            VERSION=$(echo "$TAG_NAME" | sed -E 's/^v?//; s/-.*$//')
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          python3 BUILD.py --no-container \
            --version "${{ steps.version.outputs.version }}"

      - name: Test (Linux)
        if: matrix.platform == 'linux'
        run: cd build && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          python3 BUILD.py --xcode \
            --version "${{ steps.version.outputs.version }}"

      - name: Test (macOS)
        if: matrix.platform == 'macos'
        run: cd .build_tmp/xcode/Release && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          python BUILD.py --msys2 \
            --version "${{ steps.version.outputs.version }}"
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Test (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: cd build && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Determine Version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="$REF_NAME"
          VERSION=$(echo "$TAG_NAME" | sed -E 's/^v?//; s/-.*$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: AviQtl-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
