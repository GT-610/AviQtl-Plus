name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: AviQtl

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --needed --noconfirm \
            base-devel git cmake ninja clang mold \
            qt6-base qt6-declarative qt6-quick3d qt6-multimedia qt6-shadertools \
            qt6-svg qt6-5compat qt6-tools qt6-wayland \
            ffmpeg luajit carla extra-cmake-modules \
            sudo ccache vulkan-headers vulkan-icd-loader

      - name: Run Tests
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          cd build && ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
            container: archlinux:latest
            artifact_name: AviQtl-Arch-Linux-x86_64
            artifact_path: dist/AviQtl-Arch-Linux-x86_64.zip
          - platform: macos
            runs_on: macos-14
            artifact_name: AviQtl-macOS-Universal
            artifact_path: dist/AviQtl-macOS-Xcode-Universal.zip
          - platform: windows
            runs_on: windows-latest
            artifact_name: AviQtl-Windows-x86_64
            artifact_path: dist/AviQtl-MSYS2-UCRT64-x86_64.zip
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --needed --noconfirm \
            base-devel git cmake ninja clang mold zip mesa vulkan-devel \
            libxkbcommon wayland wayland-protocols libffi ffmpeg luajit fftw \
            qt6-base qt6-wayland qt6-declarative qt6-quick3d qt6-multimedia qt6-shadertools \
            qt6-svg qt6-5compat qt6-tools lilv ladspa carla openmp \
            extra-cmake-modules libc++ fluidsynth spirv-tools \
            sudo ccache

      - name: Install Dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          echo "No additional dependencies needed"

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@5d0de63f600b6dd7b5d089d4ecbec1d2448dcd96 # v2.26.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-python

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@a0d15060b6b80297e58676625e400da3f16e6f23 # v1.2.17
        with:
          max-size: 500M
          key: ${{ matrix.platform }}-ccache

      - name: Determine Version
        id: version
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            TAG_NAME="$REF_NAME"
            VERSION=$(echo "$TAG_NAME" | sed -E 's/^v?//; s/-.*$//')
            CODENAME=$(echo "$TAG_NAME" | sed -E 's/^v?[^-]+-?//')
          else
            VERSION="0.0.0"
            CODENAME=""
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"
          if [ -n "$CODENAME" ]; then
            echo "release_name=$VERSION $CODENAME" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=$VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION, Codename: $CODENAME"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          python3 BUILD.py --no-container \
            --version "${{ steps.version.outputs.version }}" \
            --codename "${{ steps.version.outputs.codename }}"

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          python3 BUILD.py --xcode \
            --version "${{ steps.version.outputs.version }}" \
            --codename "${{ steps.version.outputs.codename }}"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          python BUILD.py --msys2 \
            --version "${{ steps.version.outputs.version }}" \
            --codename "${{ steps.version.outputs.codename }}"
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Determine Version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="$REF_NAME"
          VERSION=$(echo "$TAG_NAME" | sed -E 's/^v?//; s/-.*$//')
          CODENAME=$(echo "$TAG_NAME" | sed -E 's/^v?[^-]+-?//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"
          if [ -n "$CODENAME" ]; then
            echo "release_name=$VERSION $CODENAME" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cb28879a6f65d89866cb # v4.2.1
        with:
          path: dist
          pattern: AviQtl-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c7b3abd10451be99feeaa2e59268fb85e7b521d2 # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
